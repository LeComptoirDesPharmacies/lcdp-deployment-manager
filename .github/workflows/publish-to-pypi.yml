name: Publish Python 🐍 distributions 📦 to PyPI

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'

jobs:
  build-n-publish-rc:
    name: Build and publish release candidate 📦 to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update setup.py version (rc)
        run: |
          CURRENT_VERSION=$(grep "version=" setup.py | sed -E "s/.*version='([^']*)',.*$/\1/")
          if [[ "$CURRENT_VERSION" == *"rc"* ]]; then
            VERSION=$(echo "$CURRENT_VERSION" | sed -E "s/rc.[0-9]+/rc.${{ github.run_id }}/")
          else
            MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
            MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
            PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}rc.${{ github.run_id }}"
          fi
          sed -i "s/version='[^']*',/version='$VERSION',/" setup.py

      - name: Install setuptools, wheel and twine
        run: python -m pip install setuptools wheel twine

      - name: Build a binary wheel and source directory
        run: python setup.py sdist bdist_wheel

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.pypi_password }}
