name: Publish Python 🐍 distributions 📦 to PyPI

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'

jobs:
  build-n-publish-rc:
    name: Build and publish release candidate 📦 to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Inject RC version into setup.py
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          BASE="${LATEST_TAG#v}"
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}rc.${{ github.run_id }}"
          sed -i "s/version='[^']*',/version='$VERSION',/" setup.py

      - name: Install setuptools, wheel and twine
        run: python -m pip install setuptools wheel twine

      - name: Build a binary wheel and source directory
        run: python setup.py sdist bdist_wheel

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.pypi_password }}